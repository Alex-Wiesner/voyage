services:
  web:
    build:
      context: ./frontend/
      target: builder
    # image: ghcr.io/alex-wiesner/voyage-frontend:latest
    container_name: voyage-frontend
    restart: unless-stopped
    user: root
    env_file: .env
    environment:
      - CI=true
      - NODE_OPTIONS=--max-old-space-size=4096
    ports:
      - "${FRONTEND_PORT:-8015}:3000"
    depends_on:
      - server
    volumes:
      - ./frontend:/app
      - bun_cache:/bun-cache
    command: sh -c "mkdir -p /bun-cache && chown -R node:node /bun-cache && su node -c 'BUN_INSTALL_CACHE_DIR=/bun-cache bun install --frozen-lockfile && bun run vite dev --host 0.0.0.0 --port 3000 --strictPort'"

  db:
    image: postgis/postgis:16-3.5
    container_name: voyage-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  server:
    build: ./backend/
    # image: ghcr.io/alex-wiesner/voyage-backend:latest
    container_name: voyage-backend
    restart: unless-stopped
    entrypoint: []
    env_file: .env
    environment:
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_ADMIN_USERNAME}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_ADMIN_PASSWORD}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_ADMIN_EMAIL}
    ports:
      - "${BACKEND_PORT:-8016}:8000"
    depends_on:
      - db
    volumes:
      - ./backend/server:/code
      - voyage_media:/code/media/
    command: >
      sh -c "memcached -u nobody -m 64 -p 11211 -d;
      until pg_isready -h db -p 5432 >/dev/null 2>&1; do sleep 1; done;
      python manage.py migrate --noinput;
      python manage.py shell -c \"from worldtravel.models import Country; import sys; sys.exit(0 if Country.objects.exists() else 1)\" || python manage.py download-countries;
      if [ -n \"$$DJANGO_SUPERUSER_USERNAME\" ] && [ -n \"$$DJANGO_SUPERUSER_PASSWORD\" ] && [ -n \"$$DJANGO_SUPERUSER_EMAIL\" ]; then
        python manage.py createsuperuser --noinput --username \"$$DJANGO_SUPERUSER_USERNAME\" --email \"$$DJANGO_SUPERUSER_EMAIL\" || true;
      fi;
      python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
  voyage_media:
  bun_cache:
